<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Clave Secreta</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Adivina la clave secreta</h1>

<!-- CLAVE SECRETA -->
<div id="clave">
  <span class="digit" id="d0">*</span>
  <span class="digit" id="d1">*</span>
  <span class="digit" id="d2">*</span>
  <span class="digit" id="d3">*</span>
</div>

<!-- CRONOMETRO -->
<div>
  Tiempo: <span id="crono">00:00</span>
</div>

<!-- INTENTOS -->
<div>
  Intentos restantes: <span id="intentos">7</span>
</div>

<!-- BOTONES NUMERICOS -->
<div id="numeros"></div>

<!-- CONTROLES -->
<div class="controles">
  <button id="start">Start</button>
  <button id="stop">Stop</button>
  <button id="reset">Reset</button>
</div>

<!-- MENSAJES -->
<div id="mensaje"></div>

<script src="crono.js"></script>
<script src="script.js"></script>

</body>
</html>
