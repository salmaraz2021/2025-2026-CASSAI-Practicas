<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Beat The Word</title>
  <link rel="stylesheet" href="estilo.css">
</head>

<body>

<div class="container">

  <!-- TÍTULO -->
  <div class="header">
  <h1>Beat The Word</h1>
  <p>Sigue la secuencia al ritmo del Beat</p>
  </div>
  <!-- PANEL SUPERIOR -->
  <div class="info">
    <span>Nivel: <span id="level">1</span></span>
    <span>Tiempo: <span id="time">00:00:00</span></span>
    <span>Estado: <span id="status">En espera</span></span>
  </div>

  <div class="main game-island">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div class="box">
        <h3>Configuración</h3>

        <select id="pairSelect">
          <option value="cama-casa">Cama / Casa</option>
          <option value="pato-gato">Pato / Gato</option>
          <option value="queso-beso">Queso / Beso</option>
          <option value="luna-cuna">Luna / Cuna</option>
        </select>

        <select id="levelSelect">
          <option value="1">Nivel 1</option>
          <option value="2">Nivel 2</option>
          <option value="3">Nivel 3</option>
          <option value="4">Nivel 4</option>
          <option value="5">Nivel 5</option>
        </select>
      </div>

      <div class="box">
        <h3>Controles</h3>

        <button id="startBtn">Empezar</button>
        <button id="stopBtn">Detener</button>
      </div>

      <!-- 🎤 AUDIO -->
      <div class="box">
        <h3>Audio</h3>

        <label>
          <input type="checkbox" id="recordAudio">
          Grabar partida
        </label>

        <audio id="player" controls></audio>
      </div>

      <div class="box">
        <h3>Música</h3>

        <label>
          <input type="checkbox" id="musicToggle" checked>
          Activar música
        </label>
      </div>

   </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="content">

      <!-- MENSAJE -->
      <div id="message">Pulsa "Empezar"</div>

      <!-- GRID -->
      <div class="grid" id="grid"></div>

    </div>

  </div>
</div>

<!-- 🎵 MÚSICA -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- SCRIPTS -->
<script src="crono.js"></script>
<script src="funcionamiento.js"></script>

</body>
</html>
